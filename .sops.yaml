# sops recipient configuration. Public keys only — safe to commit.
#
# Adding a machine:
#   1. Generate its key:  age-keygen -o ~/.config/sops/age/keys.txt && chmod 600 ~/.config/sops/age/keys.txt
#   2. Print the pubkey:  age-keygen -y ~/.config/sops/age/keys.txt
#   3. Add it below as a new anchor and include it in every key_groups list.
#   4. On an existing machine:  sops updatekeys secrets/*.yaml
#   5. Commit and push; new machine pulls and runs its platform's switch command.
#
# Removing a machine: drop the anchor, run `sops updatekeys`, AND rotate every
# secret value that the removed machine ever decrypted — the old recipient
# already saw the plaintext.

keys:
  - &mims_mbp age104578lqk2s482c6g537570ztv2v8r9egyuweel5jadlc9qjf8dhq4cyguq
  - &mim_moab age16z6aaru0y89wpf0uzdcz6pc40tllx8sp7htvnmh09xn62zr8s5tqd36fku
  - &wintermute age1zanrznxpx0gwx0q4eyghpz6tvm5a96g49q4mfglht5r2rvj3cgrshl05jv

creation_rules:
  # Work-only secrets — encrypted only to the moab age key so they're truly
  # absent from personal machines (cannot decrypt even if file is present).
  # More specific path_regex; checked before the catch-all below.
  - path_regex: ^secrets/zshrc-work-local$
    key_groups:
      - age:
          - *mim_moab

  - path_regex: ^secrets/[^/]+$
    key_groups:
      - age:
          - *mims_mbp
          - *mim_moab
          - *wintermute
