# Starship prompt - powerline-go style
# plx handles: venv, username, hostname, path, git
# starship handles: status, cmd_duration, jobs, character

add_newline = false

format = """
${custom.plx}\
$status\
$cmd_duration\
$jobs\
$character\
[](fg:236) """

[username]
disabled = true

[hostname]
disabled = true

[directory]
disabled = true

[git_branch]
disabled = true

[git_commit]
disabled = true

[git_state]
disabled = true

[git_status]
disabled = true

[python]
disabled = true

[status]
disabled = false
style = "bg:red fg:15"
format = "[](fg:236 bg:red)[ $int ]($style)[](fg:red bg:236)"

[character]
success_symbol = "[ \\$ ](bg:236 fg:15)"
error_symbol = "[ \\$ ](bg:236 fg:red)"
format = "$symbol"

[custom.plx]
when = "true"
command = "plx prompt 20"
format = "$output"
shell = ["bash", "--noprofile", "--norc"]

# Disable unused modules for speed
[aws]
disabled = true
[gcloud]
disabled = true
[nodejs]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[package]
disabled = true
[docker_context]
disabled = true
[cmd_duration]
min_time = 2000
style = "bg:236 fg:yellow"
format = "[ $duration]($style)"
[line_break]
disabled = true
[jobs]
threshold = 1
number_threshold = 1
style = "bg:236 fg:yellow"
format = "[ $number]($style)"
