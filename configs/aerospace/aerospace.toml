# Auto-start settings
after-login-command = []
after-startup-command = []
start-at-login = true

# DWM-like window management behavior
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# DWM uses master-stack layout by default
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'
accordion-padding = 0

# Mouse behavior (DWM-like)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

# DWM uses zero gaps by default
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[key-mapping]
preset = 'qwerty'

# Main mode bindings (following dwm's default mod key paradigm)
[mode.main.binding]
# Layouts (dwm-style) - Modified to avoid conflicts
cmd-y = 'layout tiles horizontal vertical'  # Changed from cmd-t to avoid conflict with "New Tab"
cmd-u = 'layout floating tiling'           # Changed from cmd-f to avoid conflict with "Find"
cmd-tab = 'layout tiles horizontal vertical' # Changed to avoid conflicts
cmd-semicolon = 'layout tiles accordion floating' # Cycle through layouts (changed from cmd-space to avoid Spotlight conflict)
cmd-shift-f = 'fullscreen'                 # Toggle fullscreen

# Basic window operations (dwm-style)
cmd-shift-c = 'close'                      # Close window (dwm default)
cmd-j = 'focus down'                       # Focus next window
cmd-k = 'focus up'                         # Focus prev window
cmd-h = 'focus left'                       # Focus left window
cmd-l = 'focus right'                      # Focus right window
cmd-shift-j = 'move down'                  # Move window forward
cmd-shift-k = 'move up'                    # Move window backward

# Master/stack operations (approximating dwm behavior)
cmd-i = 'resize smart +50'                 # Increase master area
cmd-d = 'resize smart -50'                 # Decrease master area
cmd-enter = 'move left'                    # Move to master position
cmd-shift-i = 'layout h_accordion'         # Increase master count (approximation)
cmd-shift-d = 'layout v_accordion'         # Decrease master count (approximation)

# Tag (workspace) switching - using numbers like dwm
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-alt-left = 'workspace prev'            # Previous workspace
cmd-alt-right = 'workspace next'           # Next workspace
cmd-backtick = 'workspace-back-and-forth'  # Focus last workspace (backtick key)

# Move windows to tags (workspaces) - Modified to use alt+cmd
alt-cmd-1 = 'move-node-to-workspace 1'
alt-cmd-2 = 'move-node-to-workspace 2'
alt-cmd-3 = 'move-node-to-workspace 3'
alt-cmd-4 = 'move-node-to-workspace 4'
alt-cmd-5 = 'move-node-to-workspace 5'
alt-cmd-6 = 'move-node-to-workspace 6'

# Monitor controls
cmd-comma = 'focus-monitor prev'           # Focus prev monitor
cmd-period = 'focus-monitor next'          # Focus next monitor
cmd-shift-comma = 'move-workspace-to-monitor prev'    # Move window to prev monitor
cmd-shift-period = 'move-workspace-to-monitor next'   # Move window to next monitor

# Service mode for additional controls
cmd-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']    # Reset layout
backspace = ['close-all-windows-but-current', 'mode main']

# Monitor joining (similar to dwm's merge functionality)
cmd-shift-h = ['join-with left', 'mode main']
cmd-shift-j = ['join-with down', 'mode main']
cmd-shift-k = ['join-with up', 'mode main']
cmd-shift-l = ['join-with right', 'mode main']

# Gaps mode (switch between preset gaps configurations)
[mode.gaps.binding]
esc = 'mode main'
0 = ['exec-and-forget osascript -e "do shell script \"defaults write com.nikitabobko.AeroSpace gaps.outer.left 0 && defaults write com.nikitabobko.AeroSpace gaps.outer.right 0 && defaults write com.nikitabobko.AeroSpace gaps.outer.top 0 && defaults write com.nikitabobko.AeroSpace gaps.outer.bottom 0 && defaults write com.nikitabobko.AeroSpace gaps.inner.horizontal 0 && defaults write com.nikitabobko.AeroSpace gaps.inner.vertical 0\""', 'reload-config', 'mode main']
r = ['reload-config', 'mode main']         # Reset to config defaults

# Window assignment rules remain unchanged
[[on-window-detected]]
if.app-id = 'com.apple.Terminal'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['layout tiling', 'move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.vmware.fusion'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['layout tiling', 'move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij.ce'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.apple.FinalCut'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.apple.dt.Xcode'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 4']

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.linear'
run = ['move-node-to-workspace 6']

[[on-window-detected]]
if.app-id = 'com.toggl.toggldesktop'  # Time tracking
run = ['move-node-to-workspace 6']

[[on-window-detected]]
if.app-id = 'com.jetbrains.datagrip'
run = ['move-node-to-workspace 6']

# Float common utilities, dialogs, and media apps by display name.
# Verbose regex ((?x)): whitespace is ignored; use \  for a literal space.
# To add an app: insert a new `| Name` line below, alphabetized.
[[on-window-detected]]
if.app-name-regex-substring = '''(?x)^(
    1Password\ ?[0-9]*
  | Activity\ Monitor
  | AirPort\ Utility
  | App\ Store
  | Archive\ Utility
  | Calculator
  | Calendar
  | ColorSync\ Utility
  | Console
  | Contacts
  | Disk\ Utility
  | FaceTime
  | Finder
  | GIMP
  | Keychain\ Access
  | Messages
  | Migration\ Assistant
  | Photo\ Booth
  | Preview
  | QuickTime\ Player
  | Screenshot
  | Software\ Update
  | Stickies
  | System\ Information
  | System\ Preferences
  | System\ Settings
  | VLC(\ media\ player)?
)$'''
run = 'layout floating'
