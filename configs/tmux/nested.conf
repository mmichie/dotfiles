# Nested tmux styling — orange accent (colour208) instead of blue (colour39)
# Sourced conditionally via %if when TMUX_LEVEL is set
#
# WARNING: status-left and status-right below are byte-for-byte copies of the
# definitions in tmux.conf, differing ONLY in the accent color. tmux can't
# interpolate a color into #[...] from a user option, so they're duplicated.
# Keep them in sync — if the weather command, clock, or host segment changes in
# tmux.conf, mirror the change here.

setw -g pane-active-border-style "fg=colour208,bold"
setw -g window-status-current-style "fg=colour16,bg=colour208,bold"

set -g window-status-current-format "#[fg=colour234,bg=colour208]#[fg=colour16,bg=colour208,bold] #I  #W #[fg=colour208,bg=colour234,nobold]"
set -g status-left "#[fg=colour16,bg=colour208,bold] #S #[fg=colour208,bg=colour238,nobold]#[fg=colour15,bg=colour238,bold]  #[fg=colour238,bg=colour234,nobold]"
set -g status-right "#{?client_prefix,#[fg=colour16]#[bg=colour208]#[bold] PREFIX #[default] ,}#[fg=colour245]#(chevron weather --units imperial --show-city --use-nerd-font) | %R  %d %b #[fg=colour254,bg=colour234,nobold]#[fg=colour16,bg=colour254,bold] #h "
