# Ctrl-o is a more comfortable prefix
set -g prefix C-o
unbind C-b
bind C-o send-prefix

# Inherit API keys and the chevron weather location-cmd from the launching shell.
# PATH is inherited implicitly from .zshenv (see bin/bin/tmux-attach-or-new);
# we intentionally do not override it here so there's a single canonical list.
# Location itself comes from `wifi-location --latlon` (CoreLocation bridge) —
# see CHEVRON_WEATHER_LOCATION_CMD in .zshenv.
# Reset to default first: a bare -ga re-appends on every prefix-r reload
# (a long-lived server had accumulated 29 entries, including names from
# before the chevron rename).
set -gu update-environment
set -ga update-environment "PATH OPEN_WEATHER_API_KEY CHEVRON_WEATHER_LOCATION_CMD"

set -g mouse on

# Smooth mouse scrolling (1 line at a time)
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# Aggressive resize off - prevents resize thrashing that breaks Claude Code's TUI
setw -g aggressive-resize off

# Automatically renumber windows sequentially after closing any of them
set -g renumber-windows on

# Scrollback buffer size
set -g history-limit 250000

# Set terminal title
set-option -g set-titles on
set-option -g set-titles-string "#W"
set-option -g automatic-rename on
# Check @priority_title first (window-level for ssh/claude/root), then fall back to normal logic
# Note: Using #{@priority_title} without E: prefix - E: is for expanding format strings, but our values are plain text
set-option -g automatic-rename-format "#{?#{!=:#{@priority_title},},#{@priority_title},#{?#{==:#{pane_current_command},zsh},#{?#{!=:#{@dir_title},},#{@dir_title},#{b:pane_current_path}},#{pane_current_command}}}"

# Update window title when switching panes.
# Priority: @priority_title (window-level ssh/claude/root)
#         > @dir_title when the pane is back at a shell prompt
#         > @custom_title (pane-level, set by the emoji preexec) otherwise.
# The dir check comes BEFORE @custom_title on purpose: nothing clears the
# pane's @custom_title after a plain command exits (only the ssh/sudo/claude
# wrappers pop), so a finished "vim" would otherwise resurrect its emoji
# title on every refocus. At a shell prompt the stale value is ignored;
# while a command runs, pane_current_command is not a shell and the emoji
# title still wins.
# IMPORTANT: never enable automatic-rename here — precmd handles that
# (precmd only runs at the prompt, not during long-running commands).
set-hook -g pane-focus-in {
    if -F '#{!=:#{@priority_title},}' {
        rename-window "#{@priority_title}"
        set-window-option automatic-rename off
    } {
        if -F '#{&&:#{!=:#{@dir_title},},#{||:#{==:#{pane_current_command},zsh},#{==:#{pane_current_command},bash}}}' {
            rename-window "#{@dir_title}"
        } {
            if -F '#{!=:#{@custom_title},}' {
                rename-window "#{@custom_title}"
                set-window-option automatic-rename off
            }
        }
    }
}

# support pbcopy/pbpaste https://github.com/ChrisJohnsen/tmux-MacOSX-pasteboard
#set-option -g default-command "reattach-to-user-namespace -l zsh"

# Splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind S choose-session

# Pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r Left  resize-pane -L 2
bind -r Down  resize-pane -D 2
bind -r Up    resize-pane -U 2
bind -r Right resize-pane -R 2

# Window bindings
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
#bind , rename-window
bind w choose-tree -Zw
bind & confirm-before -p "kill-window #W? (y/n)" kill-window
bind , command-prompt -I "#W" "rename-window '%%'"

# Quick navigation and reference
bind f display-popup -E "tmux-sessionizer"
bind i neww bash -c "tmux-cht.sh"

# DWM-style tiling window management
# Load dwm.tmux (provides master/stack layout, command-aliases, keybindings, hooks)
source-file ~/.config/tmux/plugins/dwm.tmux/lib/dwm.tmux

#from Steve losh, his badwolf theme
set -g status-style bg=colour234
setw -g window-status-activity-style bold
setw -g pane-border-style fg=colour245
setw -g pane-active-border-style fg=colour39,bold
setw -g pane-border-lines heavy

# Dim inactive panes for better visual distinction
set -g window-style 'fg=colour247,bg=colour234'
set -g window-active-style 'fg=colour15,bg=terminal'

# Pane titles to make each pane feel more enclosed
set -g pane-border-status top
set -g pane-border-format "#{?#{==:#{@is_root},1},#[fg=white bg=red bold] ⚠️ ROOT #P #[default], #P #{?pane_active,●,○} }"
set -g message-style "fg=colour16,bg=colour221,bold"

# Custom status bar
# Powerline symbols: ⮂ ⮃ ⮀ ⮁ ⭤
set -g status-position top
set -g status-left-length 32
set -g status-right-length 150
setw -g window-status-style "fg=white,bg=colour234"
setw -g window-status-current-style "fg=colour16,bg=colour39,bold"

# NOTE: nested.conf re-declares status-left/status-right with an orange accent.
# Keep them in sync — any change here (weather cmd, clock, host segment) must be
# mirrored there. See configs/tmux/nested.conf.
set -g status-left '#[fg=colour16,bg=colour254,bold] #S #[fg=colour254,bg=colour238,nobold]#[fg=colour15,bg=colour238,bold]  #[fg=colour238,bg=colour234,nobold]'
set -g status-right '#{?client_prefix,#[fg=colour16]#[bg=colour39]#[bold] PREFIX #[default] ,}#[fg=colour245]#(chevron weather --units imperial --show-city --use-nerd-font) | %R  %d %b #[fg=colour254,bg=colour234,nobold]#[fg=colour16,bg=colour254,bold] #h '

set -g window-status-format "#[fg=colour234,bg=colour234]#[fg=white,bg=colour234] #I  #W #[fg=colour234,bg=colour234]"
set -g window-status-current-format "#[fg=colour234,bg=colour39]#[fg=colour16,bg=colour39,bold] #I  #W #[fg=colour39,bg=colour234,nobold]"

# Override accent color when nested (inner tmux inherits TMUX_LEVEL from outer)
%if #{TMUX_LEVEL}
source-file ~/.config/tmux/nested.conf
%endif

# Allow Kitty graphics protocol passthrough (chevron banner)
set -g allow-passthrough on

# Set proper terminal for Ghostty
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB:usstyle:overline"

# Allow scrolling while selecting text with mouse (hold Shift)
# Note: This disables alternate screen, so vim/less will scroll into main buffer
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Extended keys support (tmux 3.5+)
set -g extended-keys on
set -g extended-keys-format xterm

# Disable application title setting - our zsh hooks manage titles
# (brew and other apps can send OSC sequences that override our titles)
set -g allow-set-title off

# Reduce escape time to avoid delays. 10ms, not 0: a zero timeout can split
# escape sequences arriving over slow links (ssh) into a bare ESC + garbage.
set -sg escape-time 10

set -g status-interval 5

# Additional settings to reduce flickering
set -g focus-events on

# Activity
setw -g monitor-activity on
set -g visual-activity off

# Nested session toggle (M-;) — disables outer tmux so all keys pass to inner
bind -T root M-\; \
  set prefix None \;\
  set key-table off \;\
  set status off \;\
  set pane-border-status off \;\
  set pane-active-border-style "fg=colour238" \;\
  set pane-border-style "fg=colour238" \;\
  set window-active-style "fg=terminal,bg=terminal" \;\
  set window-style "fg=terminal,bg=terminal" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off M-\; \
  set -u prefix \;\
  set -u key-table \;\
  set -u status \;\
  set -u pane-border-status \;\
  set -u pane-active-border-style \;\
  set -u pane-border-style \;\
  set -u window-active-style \;\
  set -u window-style \;\
  refresh-client -S

# Reload tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display "Conf Reloaded..."
# lets copy things
setw -g mode-keys vi
# vim style yank
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi Escape send-keys -X cancel

# Mouse-drag and y copy are handled by tmux-yank (cross-platform clipboard
# detection — pbcopy here broke the Linux VM, and yank rebinds these anyway).

# Paste from / copy buffer to the system clipboard. macOS-only: pbpaste/pbcopy
# don't exist on Linux, so guard with uname (Linux goes through tmux-yank +
# mouse-drag). PATH-resolved, not /usr/bin/, on purpose.
if-shell 'test "$(uname)" = Darwin' {
    bind-key 'P' run-shell "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"
    bind-key 'Y' run-shell "tmux show-buffer | pbcopy"\; display-message "copied"
}

# TPM Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'

# Continuum settings
set -g @continuum-restore 'on'

# Yank settings - use system clipboard
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# OSC52: let tmux push copied text to the outer terminal's clipboard, so yanks
# in a remote/SSH tmux still reach the local system clipboard (tmux-yank only
# shells out to pbcopy/xclip on the local box).
set -s set-clipboard on

# Thumbs settings - quick text copying (default: prefix + Space)
set -g @thumbs-key Space

# Initialize TPM (keep this at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
