pre-commit:
  commands:
    nix-fmt:
      glob: "*.nix"
      run: nix fmt -- {staged_files} && git add {staged_files}
    statix:
      glob: "*.nix"
      run: nix run nixpkgs#statix -- check .
    shellcheck:
      files: sh -c 'git diff --cached --name-only --diff-filter=ACM | while IFS= read -r f; do [ -L "$f" ] && continue; head -1 "$f" 2>/dev/null | grep -qE "^#!/.*/(bash|sh|dash|ksh)" && echo "$f"; done; true'
      run: shellcheck {files}
    shfmt:
      files: sh -c 'git diff --cached --name-only --diff-filter=ACM | while IFS= read -r f; do [ -L "$f" ] && continue; head -1 "$f" 2>/dev/null | grep -qE "^#!/.*/(bash|sh|dash|ksh)" && echo "$f"; done; true'
      run: nix run nixpkgs#shfmt -- -i 4 -ci -w {files} && git add {files}
    ruff:
      files: sh -c 'git diff --cached --name-only --diff-filter=ACM | while IFS= read -r f; do [ -L "$f" ] && continue; case "$f" in *.py) echo "$f"; continue ;; esac; head -1 "$f" 2>/dev/null | grep -qE "^#!.*python" && echo "$f"; done; true'
      run: nix run nixpkgs#ruff -- check {files}
    stylua:
      glob: "*.lua"
      run: nix run nixpkgs#stylua -- {staged_files} && git add {staged_files}
    zsh-tests:
      glob: "{configs/zsh/**,configs/tmux/**,configs/nvim/**,secrets/**,.sops.yaml,tests/**}"
      run: zsh --no-globalrcs tests/run.zsh
    gitleaks:
      run: nix run nixpkgs#gitleaks -- git --staged --no-banner --redact -c .gitleaks.toml
    sops-check:
      run: zsh --no-globalrcs tests/sops-check.zsh {staged_files}

commit-msg:
  commands:
    conventional-commit:
      run: 'head -1 {1} | grep -qE "^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\(.+\))?(!)?: .+" || (echo "error: commit message must use conventional commits format" && exit 1)'

pre-push:
  commands:
    # Behavioral nvim gate on every push. The pre-commit zsh-tests only fire on
    # changes under configs/nvim, so a config broken by plugin drift (a :Lazy
    # update walking a plugin off lazy-lock.json, e.g. nvim-treesitter onto the
    # `main` rewrite) would slip through — no tracked file changed. Running the
    # nvim boot/treesitter probes here catches it before it leaves the machine.
    # </dev/null keeps headless nvim off any tty lefthook may allocate.
    nvim-tests:
      run: zsh --no-globalrcs tests/test_nvim.zsh </dev/null
